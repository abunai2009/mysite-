<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Арнайы тест 💖</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
}
button {
  margin:5px 0;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  background:white;
  color:black;
  transition:0.3s;
}
button:hover {
  transform: scale(1.03);
  box-shadow:0 0 10px rgba(255,255,255,0.5);
}
.correct { background:#4CAF50 !important; color:white; }
.wrong { background:#f44336 !important; color:white; }
.question-box {
  background: rgba(255,255,255,0.1);
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.result-btn {
  display:block;
  margin:20px auto;
  padding:15px 25px;
  background: linear-gradient(45deg, pink, hotpink);
  border:none;
  border-radius:30px;
  font-size:18px;
  color:white;
}
.popup, .result-screen {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:25px;
  border-radius:15px;
  text-align:center;
  display:none;
  z-index:10;
}
.love-screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:50;
  overflow:hidden;
}
.big-heart {
  font-size:80px;
  animation: beat 1s infinite;
  z-index:5;
}
@keyframes beat {
  0% { transform: scale(1);}
  50% { transform: scale(1.3);}
  100% { transform: scale(1);}
}
.love-text {
  font-size:40px;
  opacity:0;
  transform: scale(0.5);
  animation: showText 2s forwards;
  z-index:5;
}
@keyframes showText {
  to { opacity:1; transform: scale(1); }
}
.flying-heart {
  position:absolute;
  pointer-events:none;
  z-index:1;
}
</style>
</head>
<body>

<h1 style="text-align:center;">💖 Арнайы тест 💖</h1>
<div id="quiz"></div>
<button class="result-btn" onclick="askLove()">Нәтиже 💖</button>
<div class="popup" id="popup"></div>
<div class="result-screen" id="resultScreen"></div>
<div class="love-screen" id="loveScreen"></div>

<script>
const questions = [
{q:"1) Екінші крест жорығына кімдер басшылық етті?", options:["VII Людовик пен III Конрад","Ричард пен Филипп","Фредерик пен Генрих"], a:"VII Людовик пен III Конрад"},
{q:"2) ХХ ғасырда Қытайда болған революция қалай аталады?", options:["Синьхай революциясы","Культуралық революция","Тяньаньмэнь"], a:"Синьхай революциясы"},
{q:"3) Оңтүстік Америкада өмір сүрген тайпа?", options:["Инк","Ацтек","Майя"], a:"Инк"},
{q:"4) 1946 жылы Америка Құрама Штаттары қай елге тәуелсіздік берді?", options:["Филиппин","Куба","Пуэрто-Рико"], a:"Филиппин"},
{q:"5) Антанта одағы не үшін құрылды?", options:["Германия бастаған Үштік одаққа қарсы тұру үшін","Саяси реформалар үшін","Колонияларды бөлу үшін"], a:"Германия бастаған Үштік одаққа қарсы тұру үшін"},
{q:"6) 1862 жылы Авраам Линкольн қабылдаған заң қайсы?", options:["Гомстед заңы","Эмбарго заңы","Федералдық заң"], a:"Гомстед заңы"},
{q:"7) Антикоминтерн пакті нені көздеді?", options:["Коммунизмге және Коминтернге қарсы күресу","Еуропада одақ құру","Саяси реформалар"], a:"Коммунизмге және Коминтернге қарсы күресу"},
{q:"8) 1939 жылы Испанияның басшысы кім болды?", options:["Франсиско Франко","Мигель Примо","Хуан Карлос"], a:"Франсиско Франко"},
{q:"9) 1856 ж. манифест қабылдаған сұлтан?", options:["Абдулмеджид I","Сұлтан Махмуд II","Сұлтан Селим III"], a:"Абдулмеджид I"},
{q:"10) Қытайда 20 ғ. басында болған көтеріліс?", options:["Ихэтуаньдар көтерілісі","Синьхай революциясы","Культуралық революция"], a:"Ихэтуаньдар көтерілісі"},
{q:"11) Америкалық реформаторлардың көзқарасын қалыптастырған ойшылдар?", options:["Дж. Локк, Ш. Монтескье","Кант, Гегель","Руссо, Вольтер"], a:"Дж. Локк, Ш. Монтескье"},
{q:"12) Сталин саясаты?", options:["Индустрияландыру және ұжымдастыру","Демократияны дамыту","Нарықтық реформалар"], a:"Индустрияландыру және ұжымдастыру"},
{q:"13) “Дуче” атын кімге берді?", options:["Б. Муссолини","Гитлер","Черчилль"], a:"Б. Муссолини"},
{q:"14) “Үлкен үштік” кімдер болды?", options:["Черчилль, Рузвельт, Сталин","Гитлер, Муссолини, Франко","Трумэн, Эйзенхауэр, Черчилль"], a:"Черчилль, Рузвельт, Сталин"},
{q:"15) Араб-Израиль соғысы?", options:["1948-1949 ж","1950-1952 ж","1939-1940 ж"], a:"1948-1949 ж"},
{q:"16) Египеттің XI (11) династиясын кім құрды?", options:["Ментухотеп II","Тутмос III","Рамзес II"], a:"Ментухотеп II"},
{q:"17) Католик шіркеуі протестанттарға қарсы қандай шара қолданды?", options:["Қарсы реформация (Контрреформация) жүргізді","Соғыс жариялады","Тек уағыздады"], a:"Қарсы реформация (Контрреформация) жүргізді"},
{q:"18) 1933 жылы Ұлттар Лигасынан өз еркімен шыққан мемлекеттер қайсы?", options:["Германия мен Жапония","Италия мен Испания","Франция мен Ұлыбритания"], a:"Германия мен Жапония"},
{q:"19) Германиядағы фашистік қозғалысқа кімдер қолдау көрсетті?", options:["Ірі қаржы-өнеркәсіп топтары мен әскери-консервативті күштер","Халықтар","Кіші кәсіпкерлер"], a:"Ірі қаржы-өнеркәсіп топтары мен әскери-консервативті күштер"},
{q:"20) “Әскери коммунизм” саясатының негізгі мәні неде болды?", options:["Барлық ресурсты мемлекет қолына шоғырландыру","Халыққа еркіндік беру","Салықтарды төмендету"], a:"Барлық ресурсты мемлекет қолына шоғырландыру"},
{q:"21) Африкада құлдар ең көп шоғырланған аймақ қайсы?", options:["Батыс және Орталық Африка","Оңтүстік Африка","Солтүстік Африка"], a:"Батыс және Орталық Африка"},
{q:"22) Тегеран конференциясында қандай шешім қабылданды?", options:["Батыс Еуропада Екінші майданды ашу туралы","Шығыс Еуропаны бақылау","Африкадағы колонияларды бөлу"], a:"Батыс Еуропада Екінші майданды ашу туралы"},
{q:"23) 1920 жылы Қызыл Әскердің негізгі басшысы кім болды?", options:["Левон Мирзоян","Троцкий","Сталин"], a:"Левон Мирзоян"},
{q:"24) 1643–1715 жылдары қай билеуші ел басқарды?", options:["Людовик XIV","Петр I","Фридрих II"], a:"Людовик XIV"},
{q:"25) 1988–1989 жылдары Қытайда орын алған толқулар қалай басталды?", options:["Студенттердің бас көтеруімен","Еңбекшілер қозғалысы","Дербес азаматтар бастады"], a:"Студенттердің бас көтеруімен"},
{q:"26) 1940 жылы 10 мамырда Германия басып кірген ел(-дер)?", options:["Бельгия, Нидерланд, Люксембург","Франция, Польша","Дания, Норвегия"], a:"Бельгия, Нидерланд, Люксембург"},
{q:"27) VII ғасырда арабтар Тигр өзенінің бойына салған қала(лар)?", options:["Бағдад","Куфа","Дамаск"], a:"Бағдад"},
{q:"28) Философия жеке ілім ретінде б.з.б. VII–VI ғасырларда пайда болып, дамыған аймақ(тар)ды белгілеңіз?", options:["Үндістан, Грекия, Қытай","Мысыр, Ассирия","Рим, Финикия"], a:"Үндістан, Грекия, Қытай"},
{q:"29) 1939 жылы Германияға соғыс ашқан мемлекеттер?", options:["Ұлыбритания, Франция","Польша, Чехословакия","Италия, Жапония"], a:"Ұлыбритания, Франция"},
{q:"30) XIX ғасырда АҚШ-тың экономикалық дамуына әсер еткен қолайлы жағдай(-лар)?", options:["Құнарлы жерге бай болды, Әскери шығындар болмады, Сословиелік шектеу болмады","Тек қолайлы жер","Тек еңбек ресурсы"], a:"Құнарлы жерге бай болды, Әскери шығындар болмады, Сословиелік шектеу болмады"},
{q:"31) Ислам дінінің қасиетті қаласы қайсы?", options:["Мекке","Медина","Ер-Рияд"], a:"Мекке"},
{q:"32) 750 жылғы Әбу Мүслим көтерілісінен кейін қай әулеттің билігі орнады?", options:["Аббас әулеті","Умаяд әулеті","Фатимилер"], a:"Аббас әулеті"},
{q:"33) 732 жылы Пуатье шайқасында арабтарға тойтарыс бергендер кімдер?", options:["Франктер","Византия","Сақтар"], a:"Франктер"},
{q:"34) Жерорта теңізінің арғы бетінде арабтар жаулап алған мемлекет?", options:["Испания","Италия","Франция"], a:"Испания"},
{q:"35) Араб халифатының шығыс орталығы болған қала қайсы?", options:["Мерв","Багдад","Куфа"], a:"Мерв"}
];

let correct=0;
const quiz=document.getElementById("quiz");

questions.forEach(q=>{
  let div=document.createElement("div");
  div.className="question-box";
  div.innerHTML=`<p>${q.q}</p>`;
  let options = q.options.sort(()=>Math.random()-0.5);
  options.forEach(opt=>{
    let btn=document.createElement("button");
    btn.textContent=opt;
    btn.onclick=()=>{
      if(btn.disabled) return;
      if(opt===q.a){ btn.classList.add("correct"); correct++; }
      else{ btn.classList.add("wrong"); }
      Array.from(div.querySelectorAll("button")).forEach(b=>{
        b.disabled=true;
        if(b.textContent===q.a){ b.classList.add("correct"); }
      });
    };
    div.appendChild(btn);
  });
  quiz.appendChild(div);
});

function askLove(){
  popup.style.display="block";
  popup.innerHTML=`Нәтиже көресің ба, жаным? 💖<br><br>
  <button onclick="showResult()">Иә 😍</button>
  <button onclick="noClick()">Жоқ 😢</button>`;
}
function noClick(){
  popup.innerHTML=`😏 Көресің ғой бәрібір 😂<br><br>
  <button onclick="askLove()">🔙 Артқа</button>`;
}
function showResult(){
  popup.style.display="none";
  resultScreen.style.display="block";
  resultScreen.innerHTML=`💖 Нәтижең: ${correct} / ${questions.length}<br><br>
  <button onclick="startLove()">💘 Жалғастыру</button>`;
}
function startLove(){
  resultScreen.style.display="none";
  loveScreen.style.display="flex";
  loveScreen.innerHTML=`
    <div class="big-heart">❤️</div>
    <div class="love-text">КАШАН ПЕРІСЕМІЗ🤪🥵 💖</div>
  `;
  
  // Ұшатын жүректер қосу
  for(let i=0;i<70;i++){
    let heart=document.createElement('div');
    heart.textContent='🔞🔞';
    heart.className='flying-heart';
    heart.style.fontSize=Math.random()*70+10+'px';
    heart.style.left=Math.random()*window.innerWidth+'px';
    heart.style.top=window.innerHeight+'px';
    heart.style.opacity=Math.random();
    loveScreen.appendChild(heart);

    let speed=Math.random()*7+2;
    let animation=setInterval(()=>{
      let top=parseFloat(heart.style.top);
      if(top< -50){ heart.remove(); clearInterval(animation); }
      else{
        heart.style.top=(top-speed)+'px';
        heart.style.left=(parseFloat(heart.style.left)+Math.sin(top/50)*2)+'px';
      }
    },30);
  }
}
</script>
</body>
</html>
