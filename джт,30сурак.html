<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Арнайы тест 💖</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
}
button {
  margin:5px 0;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  background:white;
  color:black;
  transition:0.3s;
}
button:hover {
  transform: scale(1.03);
  box-shadow:0 0 10px rgba(255,255,255,0.5);
}
.correct { background:#4CAF50 !important; color:white; }
.wrong { background:#f44336 !important; color:white; }
.question-box {
  background: rgba(255,255,255,0.1);
  padding:15px;
  margin:15px;
  border-radius:10px;
}
.result-btn {
  display:block;
  margin:20px auto;
  padding:15px 25px;
  background: linear-gradient(45deg, pink, hotpink);
  border:none;
  border-radius:30px;
  font-size:18px;
  color:white;
}
.popup, .result-screen {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:25px;
  border-radius:15px;
  text-align:center;
  display:none;
  z-index:10;
}
.love-screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:50;
}
.big-heart {
  font-size:80px;
  animation: beat 1s infinite;
}
@keyframes beat {
  0% { transform: scale(1);}
  50% { transform: scale(1.3);}
  100% { transform: scale(1);}
}
.love-text {
  font-size:40px;
  opacity:0;
  transform: scale(0.5);
  animation: showText 2s forwards;
}
@keyframes showText {
  to { opacity:1; transform: scale(1); }
}
</style>
</head>
<body>

<h1 style="text-align:center;">💖 Арнайы тест 💖</h1>
<div id="quiz"></div>
<button class="result-btn" onclick="askLove()">Нәтиже 💖</button>
<div class="popup" id="popup"></div>
<div class="result-screen" id="resultScreen"></div>
<div class="love-screen" id="loveScreen"></div>

<script>
const questions = [
{q:"1. Екінші дүниежүзілік соғыс аяқталғанға дейін отарлық иеліктер мен мандатқа кірген аумақтар құрлықтың қамтыған бөлігі:", options:["Үштен бірі","Жартысы","Барлығы","Төрттен бірі"], a:"Үштен бірі"},
{q:"2. Екінші дүниежүзілік соғыс аяқталғанға дейін отарлық иеліктер мен мандатқа кірген аумақтарда өмір сүрді:", options:["Жер шары халқының үштен бірі","Жартысы","Барлығы","Төрттен бірі"], a:"Жер шары халқының үштен бірі"},
{q:"3. Екінші дүниежүзілік соғыстан кейін күшейе түсті:", options:["Тәуелді елдерде тәуелсіздік жолындағы күрестер","Экономикалық даму","Саяси тұрақтылық","Мәдениет"], a:"Тәуелді елдерде тәуелсіздік жолындағы күрестер"},
{q:"4. Екінші дүниежүзілік соғыс нәтижесінде Қытайдың және Оңтүстік-Шығыс Азия елдерінің орасан зор аймағын басып алып, күйреді:", options:["Жапония","Германия","Италия","АҚШ"], a:"Жапония"},
{q:"5. Екінші дүниежүзілік соғыс нәтижесінде Азия мен Африканың отарлық аймақтарындағы халықтардың ұлт-азаттығына қол жеткізуге қолайлы жағдай туғызды:", options:["Жапониянын. фашистік Германия мен Италияның күйреуі","Тек Жапония","Тек Германия","Тек Италия"], a:"Жапониянын. фашистік Германия мен Италияның күйреуі"},
{q:"6. Өз отарлық иеліктеріне бақылаулары әлсіреген метрополиялар:", options:["Франция мен Голландия","АҚШ мен Ұлыбритания","Германия мен Италия","Бельгия мен Португалия"], a:"Франция мен Голландия"},
{q:"7. Алжирді азат ету майданы 8 жылға созылды:", options:["1954-1962 жж.","1950-1958","1960-1968","1955-1963"], a:"1954-1962 жж."},
{q:"8. Алжир тәуелсіздік үшін күрескен мемлекет:", options:["Франция","АҚШ","Ұлыбритания","Германия"], a:"Франция"},
{q:"9. Алжирде мекендеген француздар саны:", options:["1 млн-ға жуық","500 мың","2 млн","750 мың"], a:"1 млн-ға жуық"},
{q:"10. «Африка жылы» деп аталды:", options:["1960 жыл","1955 жыл","1962 жыл","1965 жыл"], a:"1960 жыл"},
{q:"11. 1960 жылы тәуелсіздік алған африкалық елдер саны:", options:["17","10","20","25"], a:"17"},
{q:"12. Ағылшындар мен француздардың ең көп иеліктері орналасты:", options:["Африкада","Азияда","Еуропада","Оңтүстік Америкада"], a:"Африкада"},
{q:"13. Африкада 1960 жылдар басында пайда болған тәуелсіз мемлекеттер саны:", options:["45-ке жуық","30","50","25"], a:"45-ке жуық"},
{q:"14. Африканың отарсыздануы қатарласа жүрді:", options:["Халықаралық, африкаішілік мемлекетаралық, нәсілшілдік пен тайпааралық шиеленістердің өршуімен","Тек халықаралық","Тек африкаішілік","Тек нәсілшілдік"], a:"Халықаралық, африкаішілік мемлекетаралық, нәсілшілдік пен тайпааралық шиеленістердің өршуімен"},
{q:"15. Жаңа пайда болған көптеген мемлекеттерде орнаған тәртіптер:", options:["Әскери диктатура немесе авторитарлық-монархиялық","Демократия","Парламенттік","Коммунистік"], a:"Әскери диктатура немесе авторитарлық-монархиялық"},
{q:"16. Тәуелсіз елдердің халықтарының дербес дамуына жол ашылды:", options:["Ұлттық дәстүрлер мен мәдени-өркениеттік ерекшеліктерді ескере отырып, жаңғыру мен даму жолын таңдауына мүмкіндік туды","Тек экономикалық даму","Тек саяси тұрақтылық","Тек әскери қадам"], a:"Ұлттық дәстүрлер мен мәдени-өркениеттік ерекшеліктерді ескере отырып, жаңғыру мен даму жолын таңдауына мүмкіндік туды"},
{q:"17. Франция араб елдерінің тәуелсіздігін мойындады:", options:["1944-1945 жылдары","1950-1952","1960-1962","1940-1942"], a:"1944-1945 жылдары"},
{q:"18. Алжирде көтеріліс бұрқ етті:", options:["1945 жылдың мамыр айында","1946 жылы","1950 жылдың қаңтарында","1944 жылы"], a:"1945 жылдың мамыр айында"},
{q:"19. Францияда 1958 жылы құрылды:", options:["Бесінші Француз Республикасы","Төртінші Француз Республикасы","Үшінші Француз Республикасы","Алтыншы Француз Республикасы"], a:"Бесінші Француз Республикасы"},
{q:"20. Францияда Бесінші Республика кезінде билікке қайта оралды:", options:["Шарль де Голль","Жорж Помпиду","Франсуа Миттеран","Жак Ширак"], a:"Шарль де Голль"},
{q:"21. 1958 жылдың маусымында Францияда қабылданған заң:", options:["«Өзіне қосылған халықтармен» қарым-қатынасын қайта құру туралы","Тек экономикалық","Тек әскери","Тек мәдени"], a:"«Өзіне қосылған халықтармен» қарым-қатынасын қайта құру туралы"},
{q:"22. 1958 жылғы Құрылтайға сәйкес Франция одағы айналды:", options:["Франция Қауымдастығына","Франция Республикасына","Франция Империясына","Франция Федерациясына"], a:"Франция Қауымдастығына"},
{q:"23. Гвинея өзін тәуелсіз республика деп жариялады:", options:["1959 жылы","1960 жылы","1958 жылы","1961 жылы"], a:"1959 жылы"},
{q:"24. 1960 жылы тәуелсіздігін жариялаған Француз отарлары:", options:["Мали мен Мадагаскар","Того мен Бенин","Сенегал мен Нигер","Камерун мен Чад"], a:"Мали мен Мадагаскар"},
{q:"25. Франция Құрылтайына өзгерістер енгізді:", options:["1960 жылы","1958 жылы","1962 жылы","1959 жылы"], a:"1960 жылы"},
{q:"26. Франция бұрынғы отарларымен жаңа қатынас іздеді:", options:["1960-1963 жж.","1955-1959","1965-1967","1963-1965"], a:"1960-1963 жж."},
{q:"27. Франция Қауымдастығы іс жүзінде тоқтатылды:", options:["1961 жылдан бастап","1960 жылдан бастап","1962 жылдан бастап","1959 жылдан бастап"], a:"1961 жылдан бастап"},
{q:"28. Франция тәуелсіздікке тосқауыл қою үшін барлық күшті пайдаланды:", options:["тек Алжир жағдайында","Барлық отарларда","Тек Африкада","Тек Азияда"], a:"тек Алжир жағдайында"},
{q:"29. Францияның Алжирдегі соғысының себебі:", options:["Экономика мен мұнай","Саяси шиеленіс","Әскери ықпал","Мәдени себеп"], a:"Экономика мен мұнай"},
{q:"30. Франция Алжирде соғыс жүргізді:", options:["1954-1962 жж.","1950-1958","1960-1968","1955-1963"], a:"1954-1962 жж."}
];

let correct=0;
const quiz=document.getElementById("quiz");

questions.forEach(q=>{
  let div=document.createElement("div");
  div.className="question-box";
  div.innerHTML=`<p>${q.q}</p>`;
  let options = q.options.sort(()=>Math.random()-0.5);
  options.forEach(opt=>{
    let btn=document.createElement("button");
    btn.textContent=opt;
    btn.onclick=()=>{
      if(btn.disabled) return;
      if(opt===q.a){ btn.classList.add("correct"); correct++; }
      else{ btn.classList.add("wrong"); }
      Array.from(div.querySelectorAll("button")).forEach(b=>{
        b.disabled=true;
        if(b.textContent===q.a){ b.classList.add("correct"); }
      });
    };
    div.appendChild(btn);
  });
  quiz.appendChild(div);
});

function askLove(){
  popup.style.display="block";
  popup.innerHTML=`Нәтиже көресің ба, жаным? 💖<br><br>
  <button onclick="showResult()">Иә 😍</button>
  <button onclick="noClick()">Жоқ 😢</button>`;
}
function noClick(){
  popup.innerHTML=`😏 Көресің ғой бәрібір 😂<br><br>
  <button onclick="askLove()">🔙 Артқа</button>`;
}
function showResult(){
  popup.style.display="none";
  resultScreen.style.display="block";
  resultScreen.innerHTML=`💖 Нәтижең: ${correct} / ${questions.length}<br><br>
  <button onclick="startLove()">💘 Жалғастыру</button>`;
}
function startLove(){
  resultScreen.style.display="none";
  loveScreen.style.display="flex";
  loveScreen.innerHTML=`<div class="big-heart">❤️</div>
  <div class="love-text">Мен сені сүйем жаным 140 бал тіледім 💖</div>`;
}
</script>
</body>
</html>
